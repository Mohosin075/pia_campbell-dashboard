# Automated VPS Deployment Workflow - v3
name: Deploy Dashboard to VPS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Check Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check & Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASEURL: ${{ secrets.NEXT_PUBLIC_BASEURL || 'http://localhost:5002' }}

  deploy:
    name: Deploy to VPS
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            echo "🚀 Starting Dashboard Deployment..."

            # ── 1. Check/Install Docker ────────────────────────────────────
            if ! command -v docker &>/dev/null; then
              echo "🐳 Docker not found! Installing Docker..."
              sudo apt-get update -y
              sudo apt-get install -y ca-certificates curl gnupg lsb-release
              sudo mkdir -p /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              sudo usermod -aG docker $USER
              echo "✅ Docker installed successfully."
            else
              echo "✅ Docker is already installed: $(docker --version)"
            fi

            # ── 2. Navigate to directory ──────────────────────────────────
            TARGET_DIR="${{ secrets.VPS_DASHBOARD_PATH || '/home/ubuntu/projects/pia_campbell-dashboard' }}"
            if [ ! -d "$TARGET_DIR" ]; then
              echo "📁 Creating target directory and cloning repository: $TARGET_DIR"
              mkdir -p "$(dirname "$TARGET_DIR")"
              git clone https://github.com/${{ github.repository }}.git "$TARGET_DIR"
            fi
            cd "$TARGET_DIR"
            git fetch origin main
            git reset --hard origin/main
            echo "✅ Code updated from GitHub."

            # ── 3. Write .env.local file ──────────────────────────────────
            if [ -n "${{ secrets.DASHBOARD_ENV }}" ]; then
              echo "${{ secrets.DASHBOARD_ENV }}" > .env.local
              echo "✅ .env.local file updated."
            fi

            # ── 4. Build and run container ────────────────────────────────
            echo "🐳 Running Docker Compose..."
            sudo docker compose up -d --build --remove-orphans

            # ── 5. Cleanup ────────────────────────────────────────────────
            sudo docker image prune -f

            echo "✅ Dashboard deployed successfully!"
            sudo docker compose ps
