# Automated VPS Deployment Workflow - v4
name: Deploy Dashboard to VPS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Check Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check & Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASEURL: ${{ secrets.NEXT_PUBLIC_BASEURL || 'http://localhost:5002' }}

  deploy:
    name: Deploy to VPS
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY || secrets.SSH_PRIVATE_KEY || secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Copy files to VPS using rsync
        run: |
          TARGET_DIR="${{ secrets.VPS_DASHBOARD_PATH || '/home/ubuntu/projects/pia_campbell-dashboard' }}"
          # Ensure directory exists on VPS first
          ssh ${{ secrets.VPS_USERNAME || secrets.SSH_USER }}@${{ secrets.VPS_HOST || secrets.EC2_HOST }} "mkdir -p $TARGET_DIR"
          
          # Sync files (excluding unnecessary ones)
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.github' \
            --exclude='.env*' \
            . ${{ secrets.VPS_USERNAME || secrets.SSH_USER }}@${{ secrets.VPS_HOST || secrets.EC2_HOST }}:$TARGET_DIR/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST || secrets.EC2_HOST }}
          username: ${{ secrets.VPS_USERNAME || secrets.SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY || secrets.SSH_PRIVATE_KEY || secrets.EC2_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            echo "🚀 Starting Dashboard Deployment..."
            
            TARGET_DIR="${{ secrets.VPS_DASHBOARD_PATH || '/home/ubuntu/projects/pia_campbell-dashboard' }}"
            cd "$TARGET_DIR"

            # Write env variables from secrets
            if [ -n "${{ secrets.DASHBOARD_ENV }}" ]; then
              echo "${{ secrets.DASHBOARD_ENV }}" > .env.local
              echo "✅ .env.local file updated."
            fi

            # Build and run container
            echo "🐳 Running Docker Compose..."
            sudo docker compose up -d --build --remove-orphans
            sudo docker image prune -f

            echo "✅ Dashboard deployed successfully!"
            sudo docker compose ps
