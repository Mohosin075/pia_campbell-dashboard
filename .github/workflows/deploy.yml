# Automated VPS Deployment Workflow - v2
name: Deploy Dashboard to VPS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Check Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check & Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASEURL: ${{ secrets.NEXT_PUBLIC_BASEURL || 'http://localhost:5002' }}

  deploy:
    name: Deploy to VPS
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            echo "🚀 Starting Dashboard Deployment..."

            # Navigate to project directory (or clone if missing)
            TARGET_DIR=${{ secrets.VPS_DASHBOARD_PATH || '/home/ubuntu/projects/pia_campbell-dashboard' }}
            if [ ! -d "$TARGET_DIR" ]; then
              echo "📁 Creating target directory: $TARGET_DIR"
              git clone https://github.com/${{ github.repository }}.git "$TARGET_DIR"
              cd "$TARGET_DIR"
            else
              cd "$TARGET_DIR"
              git fetch origin main
              git reset --hard origin/main
            fi

            # Write .env.local if provided in secrets
            if [ -n "${{ secrets.DASHBOARD_ENV }}" ]; then
              echo "${{ secrets.DASHBOARD_ENV }}" > .env.local
            fi

            # Build and start Docker container
            echo "🐳 Running Docker Compose..."
            docker compose up -d --build --remove-orphans

            # Clean up unused Docker resources
            docker image prune -f

            echo "✅ Dashboard deployed successfully!"
